name: Release

# Triggered by either:
#   - a `v*` tag push (e.g. `git tag v0.1.1 && git push --tags`)
#   - manual run from the Actions tab
#
# Each runner builds for its own OS and uploads its artifacts + manifest to R2.
# macOS is handled by Codemagic (Apple silicon runners unavailable on GHA free tier).
# Linux is the only job that triggers the Cloudflare Pages site rebuild.
#
# Windows signing: SignPath Foundation (free for open-source projects).
# Apply at https://signpath.io/solutions/open-source-community
# Once approved, add SIGNPATH_API_TOKEN and SIGNPATH_ORG_ID to GitHub secrets.
on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: read
  id-token: write   # required by SignPath action for OIDC trust

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: win
          - os: ubuntu-latest
            platform: linux
            trigger_site: '1'

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          cache: 'npm'

      - name: Install
        run: npm ci

      - name: Show version
        shell: bash
        run: |
          echo "Building $(node -p "require('./package.json').version") for ${{ matrix.platform }}"
          if [ "${{ github.ref_type }}" = "tag" ]; then
            echo "Triggered by tag ${{ github.ref_name }}"
          fi

      - name: Build & publish to R2
        env:
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
          CF_PAGES_DEPLOY_HOOK: ${{ secrets.CF_PAGES_DEPLOY_HOOK }}
          RELEASE_TRIGGER_SITE_REBUILD: ${{ matrix.trigger_site }}
        run: node scripts/release.js ${{ matrix.platform }}

      # Sign the Windows installer via SignPath Foundation (free OSS tier).
      # Skipped automatically when SIGNPATH_API_TOKEN is not set (e.g. forks).
      # Setup: https://signpath.io/solutions/open-source-community
      - name: Sign Windows installer (SignPath Foundation)
        if: matrix.platform == 'win' && secrets.SIGNPATH_API_TOKEN != ''
        uses: signpath/github-action-submit-signing-request@v1
        with:
          api-token: ${{ secrets.SIGNPATH_API_TOKEN }}
          organization-id: ${{ secrets.SIGNPATH_ORG_ID }}
          signing-policy-slug: release-signing
          artifact-configuration-slug: windows-installer
          github-artifact-name: tunnex-win-unsigned
          wait-for-completion: true
          output-artifact-name: tunnex-win-signed

      # On failure leave the artifacts as a workflow artifact so we can debug
      # without pushing partial uploads to R2.
      - name: Upload artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.platform }}
          path: release/
          retention-days: 7
          if-no-files-found: ignore
