<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 64" width="360" height="64">
  <defs>
    <linearGradient id="bg-h" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1d4ed8"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="db-h" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#cbd5e1"/>
    </linearGradient>
    <linearGradient id="arr-h" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#0ea5e9"/>
      <stop offset="100%" stop-color="#38bdf8"/>
    </linearGradient>
    <linearGradient id="t-h" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#0ea5e9"/>
    </linearGradient>
  </defs>

  <!-- Icon mark: 48×48 rounded square -->
  <rect x="0" y="8" width="48" height="48" rx="10" fill="url(#bg-h)"/>
  <rect x="11" y="24" width="26" height="20" fill="url(#db-h)" opacity="0.92"/>
  <ellipse cx="24" cy="24" rx="13" ry="4" fill="#ffffff"/>
  <ellipse cx="24" cy="44" rx="13" ry="4" fill="url(#db-h)" opacity="0.85"/>
  <line x1="11" y1="31" x2="37" y2="31" stroke="#0f172a" stroke-width="1" opacity="0.2"/>
  <line x1="11" y1="37" x2="37" y2="37" stroke="#0f172a" stroke-width="1" opacity="0.2"/>
  <rect x="21" y="12" width="6" height="10" rx="2" fill="url(#arr-h)"/>
  <polygon points="24,8 30,14 18,14" fill="url(#arr-h)"/>

  <!-- "T" in sky blue -->
  <text
    x="60"
    y="50"
    font-family="'Inter', system-ui, -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif"
    font-size="52"
    font-weight="700"
    letter-spacing="-1"
    fill="url(#t-h)">T</text>
  <!-- "unnex" in near-white -->
  <text
    x="95"
    y="50"
    font-family="'Inter', system-ui, -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif"
    font-size="52"
    font-weight="700"
    letter-spacing="-1"
    fill="#f1f5f9">unnex</text>
</svg>
