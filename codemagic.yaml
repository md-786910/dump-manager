# Codemagic CI — Tunnex Linux release
#
# Handles Linux builds on the free plan (500 min/month).
# Windows and macOS are handled by GitHub Actions (free for public repos).
#
# AUTO-TRIGGER: GitHub repo → Settings → Webhooks → Add webhook
#   Payload URL : <Codemagic app → Webhooks tab → copy URL>
#   Content type: application/json
#   Events      : "Just the push event"
#
# Secrets in Codemagic UI → App → Environment variables → group "new":
#   R2_ACCESS_KEY_ID, R2_SECRET_ACCESS_KEY, R2_ENDPOINT, R2_BUCKET,
#   CF_PAGES_DEPLOY_HOOK (optional — triggers /download page rebuild)

workflows:

  release-linux:
    name: Release · Linux
    instance_type: linux
    triggering:
      events:
        - tag
      tag_patterns:
        - pattern: 'v*'
          include: true
      cancel_previous_builds: false
    environment:
      node: 22
      groups:
        - new
    scripts:
      - name: Install dependencies
        script: npm ci
      - name: Build & publish to R2
        # Linux is the only job that triggers the Cloudflare Pages site rebuild.
        script: RELEASE_TRIGGER_SITE_REBUILD=1 node scripts/release.js linux
    artifacts:
      - release/*.AppImage
      - release/*.deb
      - release/*.blockmap
