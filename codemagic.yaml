# Codemagic CI — Tunnex macOS release
#
# Handles macOS builds on Apple silicon (mac_mini_m2).
# Windows and Linux are handled by GitHub Actions.
#
# AUTO-TRIGGER: GitHub repo → Settings → Webhooks → Add webhook
#   Payload URL : <Codemagic app → Webhooks tab → copy URL>
#   Content type: application/json
#   Events      : "Just the push event"
#
# Secrets in Codemagic UI → App → Environment variables → group "new":
#   R2_ACCESS_KEY_ID, R2_SECRET_ACCESS_KEY, R2_ENDPOINT, R2_BUCKET,
#   CF_PAGES_DEPLOY_HOOK (optional — triggers /download page rebuild)

workflows:

  release-mac:
    name: Release · macOS
    instance_type: mac_mini_m2
    triggering:
      events:
        - tag
      tag_patterns:
        - pattern: 'v*'
          include: true
      cancel_previous_builds: false
    environment:
      node: 22
      groups:
        - new
    scripts:
      - name: Install dependencies
        script: npm ci
      - name: Build & publish to R2
        script: node scripts/release.js mac
    artifacts:
      - release/*.dmg
      - release/*.zip
      - release/*.blockmap
      - release/latest-mac.yml
