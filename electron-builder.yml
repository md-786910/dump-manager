appId: com.tunnex.app
productName: Tunnex
copyright: Copyright © 2026 Tunnex
artifactName: ${productName}-${version}-${os}-${arch}.${ext}

directories:
  output: release
  buildResources: build

afterPack: scripts/after-pack.js
afterSign: scripts/notarize.js

files:
  - src/**/*
  - package.json
  - "!**/*.test.js"
  - "!test/**"
  - "!scripts/dev-server.js"
  - "!scripts/release.js"
  - "!**/*.md"

# macOS: ad-hoc signed (codesign --sign -).
# Removes the "damaged app" error on Apple Silicon; users can right-click → Open
# or double-click "Open Tunnex (first time).command" inside the DMG.
# To enable full notarization later, see scripts/notarize.js.
mac:
  category: public.app-category.developer-tools
  identity: null                   # null = ad-hoc signing
  hardenedRuntime: false           # Hardened Runtime requires a paid Developer ID
  gatekeeperAssess: false
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.inherit.plist
  target:
    - target: dmg
      arch: [x64, arm64]
    - target: zip
      arch: [x64, arm64]

dmg:
  contents:
    - x: 130
      y: 220
    - x: 410
      y: 220
      type: link
      path: /Applications
    - x: 270
      y: 380
      type: file
      path: scripts/open-tunnex.command
      name: "Open Tunnex (first time).command"

# Windows: electron-builder produces unsigned artifacts.
# Signing is handled post-build by SignPath Foundation (free for OSS projects).
# See .github/workflows/release.yml for the signing step.
win:
  target:
    - target: nsis
      arch: [x64]

nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: Tunnex
  uninstallDisplayName: Tunnex
  installerSidebar: assets/installer/sidebar.png
  installerHeader: assets/installer/banner.png

linux:
  category: Development
  target:
    - target: AppImage
      arch: [x64]
    - target: deb
      arch: [x64]
  maintainer: Tunnex <hello@tunnex.biz>
  synopsis: Secure desktop tool for backing up and restoring Postgres / Mongo databases

deb:
  afterInstall: scripts/deb-postinstall.sh

# electron-updater reads latest*.yml over plain HTTPS from this URL.
# Replace <your-r2-public-host> with the public hostname Cloudflare R2 issues
# (e.g. pub-XXXXXXXXX.r2.dev) or your custom domain.
publish:
  provider: generic
  url: https://pub-d098ab4c32934fd196eb5acec30a1f42.r2.dev/releases/
  channel: latest
  useMultipleRangeRequest: true
