  <text x="24" y="38" font-size="13" fill="#e6e9ef" font-weight="700">users</text>
  <rect x="688" y="12" width="88" height="26" rx="5" fill="#1a1f27" stroke="#2a313c" stroke-width="1"/>
  <text x="732" y="29" font-size="10" fill="#aab2bf" text-anchor="middle">Read-only</text>

  <!-- Table selector tabs -->
