<svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg" font-family="JetBrains Mono, ui-monospace, monospace">
  <rect width="800" height="500" fill="#0d0f13"/>

  <!-- Background app dimmed -->
  <rect x="0" y="0" width="800" height="500" fill="#0d0f13" opacity="0.7"/>

  <!-- Modal dialog -->
  <rect x="140" y="60" width="520" height="380" rx="10" fill="#12151b" stroke="#2a313c" stroke-width="1"/>

  <!-- Modal header -->
  <rect x="140" y="60" width="520" height="52" rx="10" fill="#1a1f27" stroke="#2a313c" stroke-width="1"/>
  <rect x="140" y="90" width="520" height="22" fill="#1a1f27"/>
  <text x="168" y="91" font-size="13" fill="#e6e9ef" font-weight="700">Discover databases</text>
  <text x="643" y="91" font-size="16" fill="#6c7484" text-anchor="middle">×</text>
  <!-- Server label -->
  <text x="168" y="108" font-size="10" fill="#6c7484">prod.example.com · SSH :22</text>

  <!-- Spinner ring -->
  <circle cx="400" cy="168" r="22" fill="none" stroke="#2a313c" stroke-width="3"/>
  <path d="M 400 146 A 22 22 0 0 1 422 168" fill="none" stroke="#3b82f6" stroke-width="3" stroke-linecap="round">
    <animateTransform attributeName="transform" type="rotate" from="0 400 168" to="360 400 168" dur="1s" repeatCount="indefinite"/>
  </path>
  <text x="400" y="205" font-size="11" fill="#aab2bf" text-anchor="middle">Scanning containers…</text>

  <!-- Log output area -->
  <rect x="160" y="220" width="480" height="180" rx="6" fill="#0d0f13" stroke="#2a313c" stroke-width="1"/>

  <!-- Log lines -->
  <text x="176" y="244" font-size="10" fill="#16a34a">✓  SSH connected · prod.example.com:22</text>
  <text x="176" y="262" font-size="10" fill="#16a34a">✓  docker compose ls → 3 projects found</text>
  <text x="176" y="280" font-size="10" fill="#aab2bf">→  Scanning postgres containers…</text>
  <text x="176" y="298" font-size="10" fill="#16a34a">✓  shop-postgres-1 · PostgreSQL 16.2</text>
  <text x="194" y="312" font-size="10" fill="#6c7484">     databases: shop_prod, shop_test</text>
  <text x="176" y="330" font-size="10" fill="#aab2bf">→  Scanning mongo containers…</text>
  <text x="176" y="348" font-size="10" fill="#16a34a">✓  shop-mongo-1 · MongoDB 7.0</text>
  <text x="194" y="362" font-size="10" fill="#6c7484">     databases: catalog</text>
  <text x="176" y="382" font-size="10" fill="#3b82f6">→  Building tree…</text>

  <!-- Bottom bar -->
  <text x="168" y="432" font-size="10" fill="#6c7484">Found 3 databases across 2 services</text>
  <rect x="528" y="416" width="112" height="28" rx="5" fill="#3b82f6"/>
  <text x="584" y="434" font-size="11" fill="white" text-anchor="middle" font-weight="600">Done</text>
</svg>
