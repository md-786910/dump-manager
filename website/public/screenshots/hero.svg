<svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg" font-family="JetBrains Mono, ui-monospace, monospace">
  <!-- Background -->
  <rect width="800" height="500" fill="#0d0f13"/>

  <!-- Sidebar panel -->
  <rect x="0" y="0" width="220" height="500" fill="#12151b" stroke="#2a313c" stroke-width="1"/>

  <!-- Sidebar header -->
  <text x="16" y="28" font-size="10" fill="#6c7484" letter-spacing="1.5" font-weight="600">SERVERS</text>

  <!-- LOCAL group -->
  <text x="16" y="58" font-size="10" fill="#6c7484" letter-spacing="1">LOCAL</text>
  <!-- dev-docker server -->
  <rect x="12" y="66" width="196" height="24" rx="4" fill="#1a1f27"/>
  <circle cx="24" cy="78" r="4" fill="#16a34a"/>
  <text x="34" y="82" font-size="11" fill="#e6e9ef">dev-docker</text>
  <!-- compose project -->
  <text x="30" y="106" font-size="10" fill="#aab2bf">▾ web-app</text>
  <!-- service -->
  <text x="46" y="124" font-size="10" fill="#6c7484">postgres</text>
  <!-- databases -->
  <rect x="56" y="130" width="140" height="18" rx="3" fill="#1a1f27"/>
  <text x="66" y="143" font-size="10" fill="#3b82f6">dev_db</text>
  <text x="56" y="163" font-size="10" fill="#6c7484">test_db</text>

  <!-- VPS group -->
  <text x="16" y="192" font-size="10" fill="#6c7484" letter-spacing="1">VPS</text>
  <!-- prod server -->
  <rect x="12" y="200" width="196" height="24" rx="4" fill="#1a1f27"/>
  <circle cx="24" cy="212" r="4" fill="#16a34a"/>
  <text x="34" y="216" font-size="11" fill="#e6e9ef">prod.example.com</text>
  <!-- compose -->
  <text x="30" y="240" font-size="10" fill="#aab2bf">▾ shop</text>
  <text x="46" y="258" font-size="10" fill="#6c7484">postgres</text>
  <text x="56" y="276" font-size="10" fill="#aab2bf">shop_prod</text>
  <text x="56" y="294" font-size="10" fill="#6c7484">shop_test</text>
  <text x="46" y="314" font-size="10" fill="#6c7484">mongo</text>
  <text x="56" y="332" font-size="10" fill="#aab2bf">catalog</text>

  <!-- staging server -->
  <rect x="12" y="348" width="196" height="24" rx="4" fill="#1a1f27"/>
  <circle cx="24" cy="360" r="4" fill="#16a34a"/>
  <text x="34" y="364" font-size="11" fill="#e6e9ef">staging.example.com</text>

  <!-- Main content area -->
  <rect x="221" y="0" width="579" height="500" fill="#0d0f13"/>

  <!-- Top bar -->
  <rect x="221" y="0" width="579" height="48" fill="#12151b" stroke="#2a313c" stroke-width="1"/>
  <text x="240" y="20" font-size="10" fill="#6c7484">shop_prod</text>
  <text x="240" y="36" font-size="13" fill="#e6e9ef" font-weight="600">PostgreSQL · shop_prod</text>
  <!-- Backup button -->
  <rect x="700" y="12" width="84" height="26" rx="5" fill="#3b82f6"/>
  <text x="742" y="30" font-size="11" fill="white" text-anchor="middle" font-weight="600">Backup</text>

  <!-- Backup in progress card -->
  <rect x="240" y="72" width="540" height="160" rx="8" fill="#12151b" stroke="#2a313c" stroke-width="1"/>
  <!-- Status indicator -->
  <circle cx="260" cy="96" r="5" fill="#3b82f6">
    <animate attributeName="opacity" values="1;0.3;1" dur="1.5s" repeatCount="indefinite"/>
  </circle>
  <text x="274" y="100" font-size="12" fill="#e6e9ef" font-weight="600">Backup in progress…</text>
  <text x="274" y="116" font-size="10" fill="#6c7484">Streaming pg_dump over SSH · AES-256-GCM encrypting on the fly</text>

  <!-- Progress bar track -->
  <rect x="260" y="132" width="500" height="8" rx="4" fill="#1a1f27"/>
  <!-- Progress bar fill 78% -->
  <rect x="260" y="132" width="390" height="8" rx="4" fill="#3b82f6"/>
  <text x="260" y="158" font-size="10" fill="#aab2bf">78%</text>
  <text x="480" y="158" font-size="10" fill="#6c7484">12.4 MB received · ~4s remaining</text>

  <!-- Log lines -->
  <text x="260" y="190" font-size="10" fill="#16a34a">✓  SSH tunnel established · prod.example.com:22</text>
  <text x="260" y="208" font-size="10" fill="#16a34a">✓  Container found · shop-postgres-1</text>
  <text x="260" y="226" font-size="10" fill="#aab2bf">→  pg_dump -Fc -Z 6 shop_prod | aes-256-gcm …</text>

  <!-- Dump history -->
  <text x="240" y="262" font-size="10" fill="#6c7484" letter-spacing="1">PREVIOUS DUMPS</text>
  <rect x="240" y="270" width="540" height="44" rx="6" fill="#12151b" stroke="#2a313c" stroke-width="1"/>
  <text x="260" y="289" font-size="10" fill="#e6e9ef">shop_prod_2026-05-14_18-30.pgc.enc</text>
  <text x="260" y="305" font-size="10" fill="#6c7484">11.9 MB · 18:30 · AES-256-GCM</text>
  <text x="720" y="295" font-size="10" fill="#3b82f6" text-anchor="end">Restore</text>

  <rect x="240" y="320" width="540" height="44" rx="6" fill="#12151b" stroke="#2a313c" stroke-width="1"/>
  <text x="260" y="339" font-size="10" fill="#e6e9ef">shop_prod_2026-05-13_09-15.pgc.enc</text>
  <text x="260" y="355" font-size="10" fill="#6c7484">11.7 MB · Yesterday 09:15 · AES-256-GCM</text>
  <text x="720" y="345" font-size="10" fill="#3b82f6" text-anchor="end">Restore</text>

  <rect x="240" y="370" width="540" height="44" rx="6" fill="#12151b" stroke="#2a313c" stroke-width="1"/>
  <text x="260" y="389" font-size="10" fill="#e6e9ef">shop_prod_2026-05-12_14-00.pgc.enc</text>
  <text x="260" y="405" font-size="10" fill="#6c7484">11.5 MB · 2 days ago · AES-256-GCM</text>
  <text x="720" y="395" font-size="10" fill="#3b82f6" text-anchor="end">Restore</text>
</svg>
