<svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg" font-family="JetBrains Mono, ui-monospace, monospace">
  <rect width="800" height="500" fill="#0d0f13"/>

  <!-- Header -->
  <rect x="0" y="0" width="800" height="48" fill="#12151b" stroke="#2a313c" stroke-width="1"/>
  <text x="24" y="20" font-size="9" fill="#6c7484">Solo developer · Hetzner CX11 · $5/mo</text>
  <text x="24" y="38" font-size="14" fill="#e6e9ef" font-weight="700">my-vps.example.com</text>
  <circle cx="740" cy="24" r="5" fill="#16a34a"/>
  <text x="754" y="28" font-size="9" fill="#16a34a">online</text>

  <!-- Single server card -->
  <rect x="24" y="64" width="752" height="100" rx="8" fill="#12151b" stroke="#2a313c" stroke-width="1"/>
  <text x="44" y="88" font-size="10" fill="#6c7484" letter-spacing="1">VPS · SSH</text>
  <!-- Server icon -->
  <rect x="44" y="96" width="32" height="20" rx="3" fill="#1a1f27" stroke="#2a313c" stroke-width="1"/>
  <circle cx="70" cy="106" r="3" fill="#16a34a"/>
  <text x="84" y="108" font-size="11" fill="#e6e9ef" font-weight="600">my-vps.example.com</text>
  <text x="84" y="124" font-size="9" fill="#6c7484">Ubuntu 22.04 · Docker · 1 compose project</text>
  <!-- Stats -->
  <text x="500" y="108" font-size="10" fill="#aab2bf">Last seen: just now</text>
  <text x="500" y="124" font-size="10" fill="#aab2bf">SSH key: ~/.ssh/id_ed25519</text>

  <!-- Compose project -->
  <rect x="24" y="180" width="752" height="56" rx="6" fill="#1a1f27" stroke="#2a313c" stroke-width="1"/>
  <text x="44" y="202" font-size="10" fill="#aab2bf">▾ myapp  (docker-compose.yml)</text>
  <text x="60" y="224" font-size="10" fill="#6c7484">postgres · <tspan fill="#3b82f6">myapp_prod</tspan>  ·  port 5432</text>

  <!-- Highlighted target -->
  <rect x="24" y="252" width="752" height="100" rx="8" fill="#12151b" stroke="#3b82f6" stroke-width="1"/>
  <rect x="24" y="252" width="752" height="3" rx="2" fill="#3b82f6" opacity="0.5"/>
  <text x="44" y="276" font-size="10" fill="#3b82f6" letter-spacing="1">SELECTED · myapp_prod</text>
  <!-- Stats -->
  <rect x="44" y="284" width="160" height="52" rx="5" fill="#1a1f27"/>
  <text x="64" y="304" font-size="9" fill="#6c7484">LAST BACKUP</text>
  <text x="64" y="322" font-size="12" fill="#e6e9ef">2 hours ago</text>
  <text x="64" y="336" font-size="9" fill="#16a34a">✓ before last deploy</text>

  <rect x="216" y="284" width="160" height="52" rx="5" fill="#1a1f27"/>
  <text x="236" y="304" font-size="9" fill="#6c7484">TOTAL DUMPS</text>
  <text x="236" y="322" font-size="12" fill="#e6e9ef">47 dumps</text>
  <text x="236" y="336" font-size="9" fill="#6c7484">since Jan 2024</text>

  <rect x="388" y="284" width="160" height="52" rx="5" fill="#1a1f27"/>
  <text x="408" y="304" font-size="9" fill="#6c7484">DUMP SIZE</text>
  <text x="408" y="322" font-size="12" fill="#e6e9ef">142 MB</text>
  <text x="408" y="336" font-size="9" fill="#6c7484">latest</text>

  <!-- Backup button -->
  <rect x="620" y="284" width="136" height="52" rx="5" fill="#3b82f6"/>
  <text x="688" y="314" font-size="14" fill="white" text-anchor="middle" font-weight="700">Backup</text>
  <text x="688" y="328" font-size="9" fill="rgba(255,255,255,0.7)" text-anchor="middle">one click</text>

  <!-- Dump history -->
  <text x="24" y="380" font-size="9" fill="#6c7484" letter-spacing="1.5">RECENT DUMPS</text>
  <rect x="24" y="388" width="752" height="36" rx="5" fill="#12151b" stroke="#2a313c" stroke-width="1"/>
  <text x="44" y="407" font-size="10" fill="#e6e9ef">myapp_prod_2026-05-15_12-00.pgc.enc</text>
  <text x="44" y="419" font-size="9" fill="#6c7484">142 MB · Today before deploy</text>
  <text x="760" y="411" font-size="10" fill="#3b82f6" text-anchor="end">Restore</text>

  <rect x="24" y="430" width="752" height="36" rx="5" fill="#12151b" stroke="#2a313c" stroke-width="1"/>
  <text x="44" y="449" font-size="10" fill="#aab2bf">myapp_prod_2026-05-14_08-30.pgc.enc</text>
  <text x="44" y="461" font-size="9" fill="#6c7484">141 MB · Yesterday</text>
  <text x="760" y="453" font-size="10" fill="#3b82f6" text-anchor="end">Restore</text>
</svg>
