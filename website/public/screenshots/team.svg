<svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg" font-family="JetBrains Mono, ui-monospace, monospace">
  <rect width="800" height="500" fill="#0d0f13"/>

  <!-- Title -->
  <text x="400" y="36" font-size="13" fill="#e6e9ef" font-weight="700" text-anchor="middle">Move data between environments</text>
  <text x="400" y="54" font-size="10" fill="#6c7484" text-anchor="middle">Backup from production · restore to staging · no SSH juggling</text>

  <!-- Production card -->
  <rect x="32" y="76" width="300" height="260" rx="10" fill="#12151b" stroke="#2a313c" stroke-width="1"/>
  <!-- Green top bar -->
  <rect x="32" y="76" width="300" height="4" rx="2" fill="#16a34a"/>
  <rect x="44" y="90" width="72" height="20" rx="10" fill="#16a34a" opacity="0.2" stroke="#16a34a" stroke-width="1"/>
  <text x="80" y="104" font-size="9" fill="#16a34a" text-anchor="middle" font-weight="600">PRODUCTION</text>
  <text x="182" y="100" font-size="12" fill="#e6e9ef" font-weight="700">shop_prod</text>
  <text x="182" y="116" font-size="9" fill="#6c7484">prod.example.com</text>

  <!-- Stats -->
  <rect x="44" y="128" width="276" height="56" rx="6" fill="#1a1f27"/>
  <text x="64" y="148" font-size="9" fill="#6c7484">LAST BACKUP</text>
  <text x="64" y="164" font-size="12" fill="#e6e9ef">5 min ago</text>
  <text x="64" y="177" font-size="9" fill="#16a34a">✓ Ready to restore</text>
  <text x="200" y="148" font-size="9" fill="#6c7484">SIZE</text>
  <text x="200" y="164" font-size="12" fill="#e6e9ef">512 MB</text>

  <!-- Latest dump -->
  <text x="44" y="206" font-size="9" fill="#6c7484" letter-spacing="1">DUMP TO USE</text>
  <rect x="44" y="214" width="276" height="44" rx="5" fill="#1a1f27" stroke="#16a34a" stroke-width="1"/>
  <text x="60" y="232" font-size="9" fill="#e6e9ef">shop_prod_2026-05-15_14-30.pgc.enc</text>
  <text x="60" y="246" font-size="9" fill="#6c7484">512 MB · Today 14:30 · AES-256-GCM</text>
  <rect x="276" y="220" width="32" height="20" rx="4" fill="#16a34a" opacity="0.2"/>
  <text x="292" y="233" font-size="9" fill="#16a34a" text-anchor="middle">use</text>

  <!-- Postgres version -->
  <rect x="44" y="270" width="276" height="44" rx="5" fill="#1a1f27"/>
  <text x="60" y="290" font-size="9" fill="#6c7484">PostgreSQL 16.2  ·  pg_dump –Fc</text>
  <text x="60" y="306" font-size="9" fill="#aab2bf">847 tables · ~2.3 GB uncompressed</text>

  <!-- Arrow (center) -->
  <text x="370" y="200" font-size="28" fill="#3b82f6" text-anchor="middle">→</text>
  <text x="370" y="224" font-size="9" fill="#3b82f6" text-anchor="middle">Restore</text>
  <text x="370" y="236" font-size="9" fill="#6c7484" text-anchor="middle">to staging</text>

  <!-- CLEAN badge -->
  <rect x="330" y="256" width="80" height="22" rx="11" fill="#1a1f27" stroke="#3b82f6" stroke-width="1"/>
  <text x="370" y="271" font-size="9" fill="#3b82f6" text-anchor="middle">CLEAN first</text>

  <!-- Staging card -->
  <rect x="468" y="76" width="300" height="260" rx="10" fill="#12151b" stroke="#2a313c" stroke-width="1"/>
  <!-- Yellow/orange top bar for staging -->
  <rect x="468" y="76" width="300" height="4" rx="2" fill="#f59e0b"/>
  <rect x="480" y="90" width="60" height="20" rx="10" fill="#f59e0b" opacity="0.15" stroke="#f59e0b" stroke-width="1"/>
  <text x="510" y="104" font-size="9" fill="#f59e0b" text-anchor="middle" font-weight="600">STAGING</text>
  <text x="600" y="100" font-size="12" fill="#e6e9ef" font-weight="700">shop_staging</text>
  <text x="600" y="116" font-size="9" fill="#6c7484">staging.example.com</text>

  <!-- Before state -->
  <rect x="480" y="128" width="276" height="56" rx="6" fill="#1a1f27"/>
  <text x="500" y="148" font-size="9" fill="#6c7484">CURRENT STATE</text>
  <text x="500" y="164" font-size="12" fill="#aab2bf">3 weeks out of date</text>
  <text x="500" y="177" font-size="9" fill="#6c7484">Last restore: Apr 24</text>

  <!-- Restore target -->
  <text x="480" y="206" font-size="9" fill="#6c7484" letter-spacing="1">RESTORE TARGET</text>
  <rect x="480" y="214" width="276" height="44" rx="5" fill="#1a1f27" stroke="#3b82f6" stroke-width="1"/>
  <text x="496" y="232" font-size="9" fill="#e6e9ef">shop_staging · staging.example.com</text>
  <text x="496" y="246" font-size="9" fill="#6c7484">PostgreSQL 16.2 · compatible</text>

  <!-- Options -->
  <rect x="480" y="270" width="276" height="44" rx="5" fill="#1a1f27"/>
  <!-- Checked checkbox -->
  <rect x="496" y="282" width="13" height="13" rx="3" fill="#3b82f6"/>
  <text x="499" y="292" font-size="8" fill="white" font-weight="700">✓</text>
  <text x="516" y="293" font-size="9" fill="#e6e9ef">CLEAN before restore</text>
  <text x="496" y="308" font-size="9" fill="#6c7484">Drop all objects before restoring (prevents schema drift)</text>

  <!-- Restore button row -->
  <rect x="32" y="356" width="736" height="56" rx="8" fill="#12151b" stroke="#2a313c" stroke-width="1"/>
  <text x="52" y="380" font-size="11" fill="#e6e9ef" font-weight="600">shop_prod → shop_staging</text>
  <text x="52" y="396" font-size="9" fill="#6c7484">512 MB dump · CLEAN restore · ~45 seconds</text>
  <rect x="604" y="366" width="148" height="36" rx="6" fill="#3b82f6"/>
  <text x="678" y="388" font-size="11" fill="white" text-anchor="middle" font-weight="700">Restore now →</text>

  <!-- Bottom note -->
  <text x="400" y="444" font-size="10" fill="#aab2bf" text-anchor="middle">"Refresh staging from prod" — 30-second self-service for the whole team</text>
  <text x="400" y="462" font-size="9" fill="#6c7484" text-anchor="middle">No SSH. No pg_dump flags. No copy-pasting connection strings.</text>
</svg>
