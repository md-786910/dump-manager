<svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg" font-family="JetBrains Mono, ui-monospace, monospace">
  <rect width="800" height="500" fill="#0d0f13"/>

  <!-- Sidebar panel -->
  <rect x="20" y="20" width="260" height="460" rx="8" fill="#12151b" stroke="#2a313c" stroke-width="1"/>

  <!-- Search bar -->
  <rect x="32" y="32" width="236" height="28" rx="5" fill="#1a1f27" stroke="#2a313c" stroke-width="1"/>
  <text x="48" y="50" font-size="10" fill="#6c7484">Search servers…</text>

  <!-- LOCAL group -->
  <text x="32" y="84" font-size="9" fill="#6c7484" letter-spacing="1.5" font-weight="700">LOCAL</text>

  <!-- dev-docker -->
  <rect x="28" y="92" width="244" height="26" rx="4" fill="#1a1f27"/>
  <circle cx="42" cy="105" r="4" fill="#16a34a"/>
  <text x="52" y="109" font-size="11" fill="#e6e9ef" font-weight="600">dev-docker</text>

  <!-- Tree lines -->
  <line x1="52" y1="118" x2="52" y2="198" stroke="#2a313c" stroke-width="1"/>

  <!-- web-app compose -->
  <line x1="52" y1="134" x2="66" y2="134" stroke="#2a313c" stroke-width="1"/>
  <text x="70" y="138" font-size="10" fill="#aab2bf">▾ web-app</text>

  <!-- postgres service -->
  <line x1="52" y1="154" x2="80" y2="154" stroke="#2a313c" stroke-width="1"/>
  <text x="84" y="158" font-size="10" fill="#6c7484">postgres</text>

  <!-- databases under postgres -->
  <line x1="84" y1="168" x2="84" y2="198" stroke="#2a313c" stroke-width="1"/>
  <line x1="84" y1="173" x2="98" y2="173" stroke="#2a313c" stroke-width="1"/>
  <rect x="94" y="163" width="164" height="20" rx="3" fill="#1a1f27" stroke="#3b82f6" stroke-width="1"/>
  <text x="104" y="177" font-size="10" fill="#3b82f6">dev_db</text>

  <line x1="84" y1="193" x2="98" y2="193" stroke="#2a313c" stroke-width="1"/>
  <text x="104" y="197" font-size="10" fill="#aab2bf">test_db</text>

  <!-- mongo service -->
  <line x1="52" y1="214" x2="80" y2="214" stroke="#2a313c" stroke-width="1"/>
  <text x="84" y="218" font-size="10" fill="#6c7484">mongo</text>
  <line x1="84" y1="228" x2="98" y2="228" stroke="#2a313c" stroke-width="1"/>
  <text x="104" y="232" font-size="10" fill="#aab2bf">local_data</text>

  <!-- VPS group -->
  <text x="32" y="262" font-size="9" fill="#6c7484" letter-spacing="1.5" font-weight="700">VPS</text>

  <!-- prod server -->
  <rect x="28" y="270" width="244" height="26" rx="4" fill="#1a1f27"/>
  <circle cx="42" cy="283" r="4" fill="#16a34a"/>
  <text x="52" y="287" font-size="11" fill="#e6e9ef" font-weight="600">prod.example.com</text>

  <line x1="52" y1="296" x2="52" y2="356" stroke="#2a313c" stroke-width="1"/>
  <line x1="52" y1="312" x2="66" y2="312" stroke="#2a313c" stroke-width="1"/>
  <text x="70" y="316" font-size="10" fill="#aab2bf">▾ shop</text>
  <line x1="52" y1="332" x2="80" y2="332" stroke="#2a313c" stroke-width="1"/>
  <text x="84" y="336" font-size="10" fill="#6c7484">postgres</text>
  <line x1="84" y1="346" x2="98" y2="346" stroke="#2a313c" stroke-width="1"/>
  <text x="104" y="350" font-size="10" fill="#aab2bf">shop_prod</text>
  <line x1="52" y1="362" x2="66" y2="362" stroke="#2a313c" stroke-width="1"/>
  <text x="70" y="366" font-size="10" fill="#6c7484">▸ blog</text>

  <!-- staging server -->
  <rect x="28" y="380" width="244" height="26" rx="4" fill="#1a1f27"/>
  <circle cx="42" cy="393" r="4" fill="#16a34a"/>
  <text x="52" y="397" font-size="11" fill="#e6e9ef" font-weight="600">staging.example.com</text>
  <line x1="52" y1="406" x2="52" y2="430" stroke="#2a313c" stroke-width="1"/>
  <line x1="52" y1="416" x2="66" y2="416" stroke="#2a313c" stroke-width="1"/>
  <text x="70" y="420" font-size="10" fill="#6c7484">▸ shop-staging</text>

  <!-- Main panel - selected DB details -->
  <rect x="300" y="20" width="480" height="460" rx="8" fill="#12151b" stroke="#2a313c" stroke-width="1"/>

  <!-- Breadcrumb -->
  <text x="320" y="48" font-size="10" fill="#6c7484">dev-docker › web-app › postgres › <tspan fill="#3b82f6">dev_db</tspan></text>

  <!-- Title -->
  <text x="320" y="76" font-size="16" fill="#e6e9ef" font-weight="700">dev_db</text>
  <rect x="428" y="60" width="80" height="20" rx="10" fill="#1a1f27" stroke="#2a313c" stroke-width="1"/>
  <text x="468" y="74" font-size="9" fill="#aab2bf" text-anchor="middle">PostgreSQL 16</text>

  <!-- Action buttons -->
  <rect x="320" y="92" width="72" height="26" rx="5" fill="#3b82f6"/>
  <text x="356" y="109" font-size="11" fill="white" text-anchor="middle" font-weight="600">Backup</text>
  <rect x="400" y="92" width="72" height="26" rx="5" fill="#1a1f27" stroke="#2a313c" stroke-width="1"/>
  <text x="436" y="109" font-size="11" fill="#aab2bf" text-anchor="middle">Restore</text>
  <rect x="480" y="92" width="72" height="26" rx="5" fill="#1a1f27" stroke="#2a313c" stroke-width="1"/>
  <text x="516" y="109" font-size="11" fill="#aab2bf" text-anchor="middle">View DB</text>

  <!-- Stats row -->
  <rect x="320" y="136" width="440" height="60" rx="6" fill="#1a1f27"/>
  <text x="340" y="158" font-size="9" fill="#6c7484">LAST BACKUP</text>
  <text x="340" y="174" font-size="12" fill="#e6e9ef">2 hours ago</text>
  <line x1="480" y1="142" x2="480" y2="190" stroke="#2a313c" stroke-width="1"/>
  <text x="496" y="158" font-size="9" fill="#6c7484">DUMP COUNT</text>
  <text x="496" y="174" font-size="12" fill="#e6e9ef">14 dumps</text>
  <line x1="620" y1="142" x2="620" y2="190" stroke="#2a313c" stroke-width="1"/>
  <text x="636" y="158" font-size="9" fill="#6c7484">TOTAL SIZE</text>
  <text x="636" y="174" font-size="12" fill="#e6e9ef">168 MB</text>

  <!-- Dump list heading -->
  <text x="320" y="222" font-size="9" fill="#6c7484" letter-spacing="1.5">DUMPS</text>

  <!-- Dump rows -->
  <rect x="320" y="230" width="440" height="36" rx="5" fill="#1a1f27" stroke="#3b82f6" stroke-width="1"/>
  <text x="340" y="248" font-size="10" fill="#e6e9ef">dev_db_2026-05-15_14-23.pgc.enc</text>
  <text x="340" y="260" font-size="9" fill="#6c7484">45.2 MB · Today 14:23</text>
  <text x="744" y="252" font-size="10" fill="#3b82f6" text-anchor="end">Restore</text>

  <rect x="320" y="272" width="440" height="36" rx="5" fill="#1a1f27"/>
  <text x="340" y="290" font-size="10" fill="#aab2bf">dev_db_2026-05-15_11-07.pgc.enc</text>
  <text x="340" y="302" font-size="9" fill="#6c7484">44.8 MB · Today 11:07</text>
  <text x="744" y="294" font-size="10" fill="#3b82f6" text-anchor="end">Restore</text>

  <rect x="320" y="314" width="440" height="36" rx="5" fill="#1a1f27"/>
  <text x="340" y="332" font-size="10" fill="#aab2bf">dev_db_2026-05-14_18-30.pgc.enc</text>
  <text x="340" y="344" font-size="9" fill="#6c7484">44.1 MB · Yesterday 18:30</text>
  <text x="744" y="336" font-size="10" fill="#3b82f6" text-anchor="end">Restore</text>

  <rect x="320" y="356" width="440" height="36" rx="5" fill="#1a1f27"/>
  <text x="340" y="374" font-size="10" fill="#aab2bf">dev_db_2026-05-13_09-15.pgc.enc</text>
  <text x="340" y="386" font-size="9" fill="#6c7484">43.7 MB · 2 days ago 09:15</text>
  <text x="744" y="378" font-size="10" fill="#3b82f6" text-anchor="end">Restore</text>
</svg>
