<svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg" font-family="JetBrains Mono, ui-monospace, monospace">
  <rect width="800" height="500" fill="#0d0f13"/>

  <!-- Update banner at top -->
  <rect x="0" y="0" width="800" height="44" fill="#1a1f27" stroke="#3b82f6" stroke-width="1"/>
  <rect x="0" y="0" width="3" height="44" fill="#3b82f6"/>
  <!-- Green dot -->
  <circle cx="20" cy="22" r="5" fill="#16a34a"/>
  <text x="34" y="19" font-size="11" fill="#e6e9ef" font-weight="600">Tunnex 0.1.12 is ready</text>
  <text x="34" y="33" font-size="9" fill="#6c7484">Downloaded in background · 8.3 MB · signed manifest verified</text>
  <!-- Buttons -->
  <rect x="560" y="10" width="112" height="24" rx="4" fill="#3b82f6"/>
  <text x="616" y="26" font-size="10" fill="white" text-anchor="middle" font-weight="600">Restart now</text>
  <rect x="682" y="10" width="96" height="24" rx="4" fill="#1a1f27" stroke="#2a313c" stroke-width="1"/>
  <text x="730" y="26" font-size="10" fill="#aab2bf" text-anchor="middle">Later</text>

  <!-- Main app below banner -->
  <rect x="0" y="44" width="800" height="48" fill="#12151b" stroke="#2a313c" stroke-width="1"/>
  <text x="24" y="64" font-size="9" fill="#6c7484">prod.example.com › shop › postgres</text>
  <text x="24" y="80" font-size="13" fill="#e6e9ef" font-weight="700">shop_prod · PostgreSQL</text>
  <rect x="692" y="58" width="84" height="24" rx="4" fill="#3b82f6"/>
  <text x="734" y="74" font-size="10" fill="white" text-anchor="middle">Backup</text>

  <!-- Content area -->
  <rect x="24" y="108" width="752" height="72" rx="6" fill="#12151b" stroke="#2a313c" stroke-width="1"/>
  <text x="44" y="132" font-size="10" fill="#6c7484" letter-spacing="1">WHAT'S NEW IN 0.1.12</text>
  <text x="44" y="152" font-size="10" fill="#aab2bf">• MySQL / MariaDB discovery (beta)</text>
  <text x="44" y="168" font-size="10" fill="#aab2bf">• Improved SSH reconnect on flaky connections · Fix: progress stall on large Mongo dumps</text>

  <!-- Dump list -->
  <text x="24" y="204" font-size="9" fill="#6c7484" letter-spacing="1.5">RECENT DUMPS</text>
  <rect x="24" y="212" width="752" height="40" rx="5" fill="#12151b" stroke="#2a313c" stroke-width="1"/>
  <text x="44" y="231" font-size="10" fill="#e6e9ef">shop_prod_2026-05-15_14-23.pgc.enc</text>
  <text x="44" y="245" font-size="9" fill="#6c7484">45.2 MB · Today 14:23</text>
  <text x="760" y="235" font-size="10" fill="#3b82f6" text-anchor="end">Restore</text>

  <rect x="24" y="258" width="752" height="40" rx="5" fill="#12151b" stroke="#2a313c" stroke-width="1"/>
  <text x="44" y="277" font-size="10" fill="#aab2bf">shop_prod_2026-05-14_18-30.pgc.enc</text>
  <text x="44" y="291" font-size="9" fill="#6c7484">44.8 MB · Yesterday 18:30</text>
  <text x="760" y="281" font-size="10" fill="#3b82f6" text-anchor="end">Restore</text>

  <!-- Update history card -->
  <rect x="24" y="320" width="752" height="148" rx="8" fill="#12151b" stroke="#2a313c" stroke-width="1"/>
  <text x="44" y="344" font-size="10" fill="#6c7484" letter-spacing="1">UPDATE HISTORY</text>

  <rect x="36" y="354" width="8" height="8" rx="2" fill="#16a34a"/>
  <text x="54" y="362" font-size="10" fill="#e6e9ef">0.1.12  →  current</text>
  <text x="360" y="362" font-size="9" fill="#6c7484">today</text>

  <rect x="36" y="380" width="8" height="8" rx="2" fill="#2a313c"/>
  <text x="54" y="388" font-size="10" fill="#aab2bf">0.1.11</text>
  <text x="360" y="388" font-size="9" fill="#6c7484">3 days ago</text>

  <rect x="36" y="404" width="8" height="8" rx="2" fill="#2a313c"/>
  <text x="54" y="412" font-size="10" fill="#aab2bf">0.1.10</text>
  <text x="360" y="412" font-size="9" fill="#6c7484">2 weeks ago</text>

  <rect x="36" y="428" width="8" height="8" rx="2" fill="#2a313c"/>
  <text x="54" y="436" font-size="10" fill="#aab2bf">0.1.9</text>
  <text x="360" y="436" font-size="9" fill="#6c7484">1 month ago</text>

  <text x="44" y="460" font-size="9" fill="#6c7484">Updates download silently · you choose when to restart</text>
</svg>
